<!DOCTYPE html>
<html>
<head><title>Icon Generator</title>
<style>
  body { font-family: system-ui; padding: 24px; background: #0f172a; color: #fff; }
  canvas { border-radius: 12px; margin: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
  .row { display: flex; flex-wrap: wrap; align-items: flex-end; gap: 16px; margin: 16px 0; }
  button { background: #16a34a; color: #fff; border: none; border-radius: 8px; padding: 10px 20px; cursor: pointer; font-size: 14px; font-weight: 600; margin: 4px; }
  button:hover { background: #15803d; }
  h2 { color: #6ee7b7; }
  .label { font-size: 11px; color: #94a3b8; text-align: center; margin-top: 4px; }
</style>
</head>
<body>
<h2>MultiMian ImageKit — Icon Generator</h2>
<p style="color:#94a3b8">Click each button to download the PNG. Save them in your project root.</p>

<div class="row" id="previews"></div>
<div style="margin-top:16px;">
  <button onclick="downloadAll()">⬇ Download All Icons</button>
</div>

<script>
const SVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#16a34a"/>
      <stop offset="50%"  stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bg)"/>
  <rect width="64" height="64" rx="14" ry="14" fill="url(#shine)"/>
  <rect x="1" y="1" width="62" height="62" rx="13" ry="13" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
  <rect x="11" y="16" width="42" height="30" rx="4" ry="4" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <clipPath id="frame-clip">
    <rect x="11" y="16" width="42" height="30" rx="4" ry="4"/>
  </clipPath>
  <g clip-path="url(#frame-clip)">
    <rect x="11" y="16" width="42" height="30" fill="rgba(255,255,255,0.08)"/>
    <circle cx="44" cy="24" r="5" fill="rgba(255,255,255,0.55)"/>
    <polygon points="11,46 26,24 38,38 42,32 53,46" fill="rgba(255,255,255,0.28)"/>
    <polygon points="26,24 31,30 22,38" fill="rgba(255,255,255,0.18)"/>
  </g>
  <g transform="translate(47,10)">
    <path d="M4,0 L4.8,3.2 L8,4 L4.8,4.8 L4,8 L3.2,4.8 L0,4 L3.2,3.2 Z" fill="#ffffff" opacity="0.95"/>
  </g>
  <circle cx="15" cy="52" r="2.5" fill="rgba(255,255,255,0.6)"/>
  <circle cx="22" cy="54" r="1.5" fill="rgba(255,255,255,0.35)"/>
  <text x="36" y="57" font-family="system-ui" font-size="11" font-weight="800" fill="rgba(255,255,255,0.75)" letter-spacing="-0.5">MK</text>
</svg>`;

const SIZES = [
  { size: 16,  name: 'favicon-16x16.png' },
  { size: 32,  name: 'favicon-32x32.png' },
  { size: 48,  name: 'favicon-48x48.png' },
  { size: 64,  name: 'favicon.png' },
  { size: 180, name: 'apple-touch-icon.png' },
  { size: 192, name: 'icon-192.png' },
  { size: 512, name: 'icon-512.png' },
];

const canvases = {};

function svgToCanvas(size) {
  return new Promise(resolve => {
    const svgScaled = SVG.replace('width="64"', `width="${size}"`).replace('height="64"', `height="${size}"`);
    const blob = new Blob([svgScaled], { type: 'image/svg+xml' });
    const url = URL.createObjectURL(blob);
    const img = new Image();
    img.onload = () => {
      const c = document.createElement('canvas');
      c.width = size; c.height = size;
      const ctx = c.getContext('2d');
      // For small sizes, add slight smoothing
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = 'high';
      ctx.drawImage(img, 0, 0, size, size);
      URL.revokeObjectURL(url);
      resolve(c);
    };
    img.src = url;
  });
}

async function init() {
  const container = document.getElementById('previews');
  for (const { size, name } of SIZES) {
    const c = await svgToCanvas(size);
    canvases[name] = c;
    // Show preview at display size (min 48px for visibility)
    const displaySize = Math.max(48, Math.min(size, 128));
    const wrapper = document.createElement('div');
    wrapper.style.textAlign = 'center';
    const preview = document.createElement('canvas');
    preview.width = displaySize; preview.height = displaySize;
    preview.style.borderRadius = Math.round(displaySize * 0.22) + 'px';
    const pctx = preview.getContext('2d');
    pctx.drawImage(c, 0, 0, displaySize, displaySize);
    const lbl = document.createElement('div');
    lbl.className = 'label';
    lbl.textContent = `${size}×${size}`;
    const btn = document.createElement('button');
    btn.textContent = `⬇ ${name}`;
    btn.style.fontSize = '11px';
    btn.style.padding = '6px 10px';
    btn.style.marginTop = '6px';
    btn.onclick = () => download(c, name);
    wrapper.appendChild(preview);
    wrapper.appendChild(lbl);
    wrapper.appendChild(document.createElement('br'));
    wrapper.appendChild(btn);
    container.appendChild(wrapper);
  }
}

function download(canvas, name) {
  canvas.toBlob(blob => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = name;
    a.click();
  }, 'image/png');
}

async function downloadAll() {
  for (const { name } of SIZES) {
    if (canvases[name]) {
      download(canvases[name], name);
      await new Promise(r => setTimeout(r, 300));
    }
  }
}

init();
</script>
</body>
</html>
