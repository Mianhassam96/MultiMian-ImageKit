<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Main background gradient: green → blue → indigo -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#16a34a"/>
      <stop offset="50%"  stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <!-- Shimmer overlay -->
    <linearGradient id="shine" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- Inner glow for image icon -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bg)"/>

  <!-- Shine overlay -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#shine)"/>

  <!-- Subtle inner border -->
  <rect x="1" y="1" width="62" height="62" rx="13" ry="13"
        fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>

  <!-- Image frame icon — landscape photo shape -->
  <rect x="11" y="16" width="42" height="30" rx="4" ry="4"
        fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>

  <!-- Mountain / landscape inside frame -->
  <!-- Sky gradient fill inside frame -->
  <clipPath id="frame-clip">
    <rect x="11" y="16" width="42" height="30" rx="4" ry="4"/>
  </clipPath>
  <g clip-path="url(#frame-clip)">
    <!-- Sky -->
    <rect x="11" y="16" width="42" height="30" fill="rgba(255,255,255,0.08)"/>
    <!-- Sun / circle -->
    <circle cx="44" cy="24" r="5" fill="rgba(255,255,255,0.55)"/>
    <!-- Mountain left -->
    <polygon points="11,46 26,24 38,38 42,32 53,46"
             fill="rgba(255,255,255,0.28)"/>
    <!-- Mountain highlight -->
    <polygon points="26,24 31,30 22,38"
             fill="rgba(255,255,255,0.18)"/>
  </g>

  <!-- Sparkle star — top right corner accent -->
  <g transform="translate(47,10)" filter="url(#glow)">
    <path d="M4,0 L4.8,3.2 L8,4 L4.8,4.8 L4,8 L3.2,4.8 L0,4 L3.2,3.2 Z"
          fill="#ffffff" opacity="0.95"/>
  </g>

  <!-- Small dot accent — bottom left -->
  <circle cx="15" cy="52" r="2.5" fill="rgba(255,255,255,0.6)"/>
  <circle cx="22" cy="54" r="1.5" fill="rgba(255,255,255,0.35)"/>

  <!-- "M" lettermark — bottom right, subtle -->
  <text x="36" y="57"
        font-family="'Space Grotesk', 'Segoe UI', system-ui, sans-serif"
        font-size="11" font-weight="800"
        fill="rgba(255,255,255,0.75)"
        letter-spacing="-0.5">MK</text>
</svg>
